  <style>
    @keyframes glitchText {
      0%, 100% { transform: translate(0); opacity: 1; }
      10% { transform: translate(-3px, 2px); opacity: 0.8; }
      20% { transform: translate(3px, -1px); opacity: 1; }
      30% { transform: translate(0); }
      40% { transform: translate(-2px, -2px); opacity: 0.9; }
      50% { transform: translate(2px, 1px); opacity: 1; }
      60% { transform: translate(0); }
    }
    @keyframes glitchLayer1 {
      0%, 100% { clip-path: inset(0 0 100% 0); }
      5% { clip-path: inset(20% 0 60% 0); transform: translate(-4px, 0); }
      10% { clip-path: inset(50% 0 30% 0); transform: translate(4px, 0); }
      15% { clip-path: inset(0 0 100% 0); transform: translate(0); }
    }
    @keyframes glitchLayer2 {
      0%, 100% { clip-path: inset(0 0 100% 0); }
      8% { clip-path: inset(70% 0 10% 0); transform: translate(5px, 0); }
      12% { clip-path: inset(10% 0 70% 0); transform: translate(-3px, 0); }
      16% { clip-path: inset(0 0 100% 0); transform: translate(0); }
    }
    @keyframes scanline {
      0% { top: -10%; }
      100% { top: 110%; }
    }
    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.4; }
      97% { opacity: 1; }
      98% { opacity: 0.7; }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(200, 50, 50, 0.3), inset 0 0 8px rgba(200, 50, 50, 0.1); }
      50% { box-shadow: 0 0 20px rgba(200, 50, 50, 0.5), inset 0 0 15px rgba(200, 50, 50, 0.2); }
    }
    @keyframes subtleDrift {
      0%, 100% { transform: scale(1.05) translate(0, 0); }
      25% { transform: scale(1.07) translate(-5px, -3px); }
      50% { transform: scale(1.05) translate(3px, -5px); }
      75% { transform: scale(1.07) translate(-3px, 2px); }
    }
  @keyframes noiseShift {
  0% { background-position: 0 0; }
  100% { background-position: 100% 100%; }
}
     
  @keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.6; transform:scale(1.02); }
}

.glow {
  position:absolute;
  width:400px;
  height:400px;
  background:radial-gradient(circle, rgba(200,80,80,0.2), transparent 70%);
  animation: float 6s infinite ease-in-out;
}

@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-30px); }
}
.core {
  width:120px;
  height:120px;
  border-radius:50%;
  border:2px solid rgba(200,80,80,0.4);
  box-shadow: 0 0 40px rgba(200,50,50,0.3);
  animation: spin 3s linear infinite;
  margin-bottom:25px;
  position:relative;
}

.core::before {
  content:'';
  position:absolute;
  inset:10px;
  border-radius:50%;
  border:1px dashed rgba(232,213,196,0.3);
  animation: spinReverse 6s linear infinite;
}

#startBtn {
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  transition: 0.5s ease;
}

#intro.ready #startBtn {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

@keyframes spin {
  0% { transform: rotate(0); }
  100% { transform: rotate(360deg); }
}

@keyframes spinReverse {
  0% { transform: rotate(360deg); }
  100% { transform: rotate(0); }
}

@keyframes spin {
  0% { transform: rotate(0); }
  100% { transform: rotate(360deg); }
}

0%,100% { transform: translateY(0); }
50% { transform: translateY(-25px); }
}

50% { transform: scale(1.05); opacity:0.7; }

#menu {

    .title-glitch {

document.addEventListener("DOMContentLoaded", () => {

  const intro = document.getElementById("intro");
  const menu = document.getElementById("menu");
  const btn = document.getElementById("startBtn");

  const statusText = document.getElementById("statusText");
  const subText = document.getElementById("subText");
  const pressText = document.getElementById("pressText");

  const audio = document.getElementById("menuMusic");

  audio.src = "music/menu.mp3";
  audio.loop = true;
  audio.volume = 0.1;

  const steps = [
    ["Loading Otome Game", "initializing emotional core..."],
    ["Loading Otome Game", "building character routes..."],
    ["Loading Otome Game", "syncing narrative threads..."]
  ];

  let i = 0;
  let phase = "loading";

  // sécurité DOM
  if (!intro || !menu || !btn) {
    console.error("Elements manquants DOM");
    return;
  }

  
  btn.style.opacity = "0";
  btn.style.pointerEvents = "none";

  function runLoading() {
    const interval = setInterval(() => {
      const [title, sub] = steps[i];

      statusText.textContent = title;
      subText.textContent = sub;

      i++;

      if (i >= steps.length) {
        clearInterval(interval);
        enterReady();
      }
    }, 1200);
  }

  function enterReady() {
    phase = "ready";

    statusText.textContent = "Bungou Stray Dogs: Page 0";
    subText.textContent = "";
    pressText.style.opacity = "1";

    btn.style.pointerEvents = "auto";

    setTimeout(() => {
      btn.style.opacity = "1";
      btn.style.transform = "translateY(0)";
    }, 100);
  }

  btn.addEventListener("click", async () => {
    if (phase !== "ready") return;

    intro.style.opacity = "0";

    try {
      await audio.play();
    } catch (e) {
      console.log("audio blocked:", e);
    }

    setTimeout(() => {
      intro.style.display = "none";
      menu.style.display = "flex";
    }, 800);
  });

  runLoading();

});

function startGame() {
  window.location.href = "game.html";
}

function loadGameMenu() {
  const save = loadSave();

  const container = document.getElementById("loadContainer");
  container.innerHTML = "";

  save.unlockedChapters.forEach(chap => {
    const btn = document.createElement("button");
    btn.textContent = "Chapter " + chap;

    btn.onclick = () => {
      save.currentChapter = chap;
      save.currentScene = 0;
      saveGame(save);
      window.location.href = "game.html";
    };

    container.appendChild(btn);
  });
}
function goSettings() {
  window.location.href = "settings.html";
}
