<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chapters</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<script src="js/saveSystem.js"></script>

<style>
body {
  margin:0;
  font-family: 'Rajdhani', sans-serif;
  background: radial-gradient(circle at top, #1a0c0c, #0a0608);
  color:#e8d5c4;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1 {
  letter-spacing:6px;
  margin-top:40px;
  text-transform:uppercase;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap:15px;
  width:90%;
  max-width:900px;
  margin-top:40px;
}

.card {
  position:relative;
  height:140px;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;

  background: rgba(255,255,255,0.05);
  border:1px solid rgba(200,80,80,0.25);
  transition:0.2s;
}

.card:hover {
  transform:scale(1.05);
  border-color: rgba(255,100,100,0.6);
}

.card img {
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6);
}

.title {
  position:absolute;
  bottom:10px;
  left:10px;
  font-weight:bold;
  text-shadow:0 0 10px black;
}

.lock {
  position:absolute;
  top:10px;
  right:10px;
  font-size:20px;
}

.locked {
  filter: grayscale(1) brightness(0.4);
  pointer-events:none;
}

.back {
  position:absolute;
  top:15px;
  left:15px;
  cursor:pointer;
  opacity:0.8;
}

.back:hover {
  opacity:1;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← Menu</div>

<h1>CHAPTERS</h1>

<div class="grid" id="grid"></div>
<script src="js/saveSystem.js"></script>

<script>
async function loadChapters() {

  let save;
  try {
    save = loadSave();
  } catch (e) {
    localStorage.clear();
    save = getDefaultSave();
  }

  const res = await fetch("json/chaptersIndex.json");
  const chapters = await res.json();

  const grid = document.getElementById("grid");

  
  chapters.forEach(ch => {

    let dataLoaded = true;

    const unlocked = save.unlockedChapters.includes(
      parseInt(ch.file.match(/\d+/)[0])
    );

    const card = document.createElement("div");
    card.className = "card";

    if (!unlocked) card.classList.add("locked");

    card.innerHTML = `
      <img src="${ch.thumbnail}">
      <div class="title">${ch.type.toUpperCase()}</div>
      <div class="lock">${unlocked ? "✔" : "🔒"}</div>
    `;

    card.onclick = async () => {

      if (!unlocked) return;

      // charger fichier réel
      const data = await fetch(ch.file).then(r => r.json());

      save.currentChapter = data.chapter;
      save.currentScene = 0;
      saveGame(save);

      window.location.href = "game.html";
    };

    grid.appendChild(card);
  });
}

loadChapters();
function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
