
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap');

@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100vh !important;
  overflow: hidden;
  background: #0c0a10;
}

#scene-root {
  height: 100vh !important;
  display: flex;
  flex-direction: column;
  /* ENLÈVE justify-content: flex-start ← c'est ÇA le problème ! */
}
#void-canvas {
  width: 100%;
  height: 220px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  background: #0c0a10;
}

#dialog-panel {
  flex: 1 1 auto !important;  /* Prend TOUT l'espace restant */
  display: flex;              /* Nouveau */
  flex-direction: column;     /* Nouveau */
  justify-content: flex-end;  /* ← POUSSÉ EN BAS */
  padding: 0 24px 40px;       /* Plus d'espace bas */
}

/* Reste de ton CSS inchangé (book-svg, particles, etc.) */
  #void-canvas {
    width: 100%;
    height: 220px;
    position: relative;
    overflow: hidden;
    background: #0c0a10;
    flex-shrink: 0;
  }

  #void-canvas canvas {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
  }

  #book-svg {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -52%);
    width: 120px;
    z-index: 2;
    pointer-events: none;
  }

  #glow-ring {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 160px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(200,160,80,0.18) 0%, transparent 70%);
    z-index: 1;
    animation: ringPulse 3s ease-in-out infinite;
  }

  @keyframes ringPulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.12); }
  }

  #particles-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 0.9; }
    80% { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-120px) scale(1); }
  }

  #dialog-panel {
    width: 100%;
    background: linear-gradient(180deg, rgba(12,10,16,0.97) 0%, #0c0a10 100%);
    padding: 0 24px 20px;
    position: relative;
    z-index: 10;
    flex: 1;
  }

  #speaker-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,160,80,0.12);
    border: 1px solid rgba(200,160,80,0.35);
    border-radius: 20px;
    padding: 4px 14px;
    margin-bottom: 10px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: #c8a050;
  }

  #speaker-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #c8a050;
    animation: dotBlink 1.5s ease-in-out infinite;
  }

  @keyframes dotBlink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
  }

  #dialog-box {
    background: rgba(200,160,80,0.05);
    border: 1px solid rgba(200,160,80,0.15);
    border-radius: 10px;
    padding: 16px 18px;
    min-height: 72px;
    cursor: pointer;
    position: relative;
  }

  #dialog-text {
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: 15px;
    line-height: 1.7;
    color: #e8d8b0;
    letter-spacing: 0.01em;
  }

  #cursor-blink {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: #c8a050;
    margin-left: 2px;
    vertical-align: middle;
    animation: cursorBlink 0.8s infinite;
  }

  @keyframes cursorBlink {
    0%, 100% { opacity: 1; } 50% { opacity: 0; }
  }

  #next-arrow {
    position: absolute;
    bottom: 10px;
    right: 14px;
    color: #c8a050;
    font-size: 14px;
    opacity: 0;
    animation: arrowBounce 1.2s ease-in-out infinite;
  }

  @keyframes arrowBounce {
    0%, 100% { opacity: 0.6; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(3px); }
  }

  #choices-area {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-top: 14px;
  }

  .choice-btn {
    background: rgba(200,160,80,0.07);
    border: 1px solid rgba(200,160,80,0.22);
    border-radius: 8px;
    padding: 10px 16px;
    color: #e8d8b0;
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
  }

  .choice-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: #c8a050;
    border-radius: 3px 0 0 3px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .choice-btn:hover {
    background: rgba(200,160,80,0.15);
    border-color: rgba(200,160,80,0.4);
    transform: translateX(4px);
  }

  .choice-btn:hover::before { opacity: 1; }

  #page-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: rgba(200,160,80,0.45);
  }

  .nav-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(200,160,80,0.25);
    transition: background 0.3s;
    cursor: pointer;
  }

  .nav-dot.active { background: #c8a050; }

  #page-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  #rule-card {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(12,10,16,0.97);
    border-radius: 10px;
    padding: 18px 20px;
    z-index: 20;
    flex-direction: column;
    gap: 10px;
    animation: fadeSlideIn 0.35s ease;
    overflow-y: auto;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .rule-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: rgba(200,160,80,0.05);
    border: 1px solid rgba(200,160,80,0.12);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .rule-icon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .rule-text {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 13px;
    line-height: 1.6;
    color: #d0c090;
  }

  .rule-text strong {
    color: #c8a050;
    font-weight: 600;
  }

  .rule-close-btn {
    background: rgba(200,160,80,0.12);
    border: 1px solid rgba(200,160,80,0.3);
    border-radius: 8px;
    padding: 8px;
    color: #c8a050;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s;
  }

  .rule-close-btn:hover { background: rgba(200,160,80,0.22); }
</style>

<script>
const scenes = [
  {
    speaker: "Atsushi",
    text: "Où... où suis-je ? Je ne sens plus rien. Ni le sol, ni le vent, ni le livre dans mes mains...",
    isPlayer: true
  },
  {
    speaker: "Akh",
    text: "Dans l'espace entre les mots. Entre ce qui a été écrit et ce qui ne l'est pas encore.",
  },
  {
    speaker: "Atsushi",
    text: "Qui es-tu ?",
    isPlayer: true
  },
  {
    speaker: "Akh",
    text: "Je suis Akh. L'âme qui veille sur ce livre depuis que ses prêtres l'ont scellé. Je suis ce qui reste de leur intention.",
  },
  {
    speaker: "Atsushi",
    text: "Ce livre... c'est quoi, exactement ?",
    isPlayer: true,
    showRules: false
  },
  {
    speaker: "Akh",
    text: "Le Livre de Mérenrê. Créé par les prêtres d'un pharaon qui voulait l'immortalité. Il écrit lui-même — à travers toi.",
    writeLines: true
  },
  {
    speaker: "Akh",
    text: "En touchant ce livre pendant l'incantation de Kaito, tu es devenu son Détenteur. Tu es désormais lié à lui — et lui à toi.",
  },
  {
    speaker: "Atsushi",
    text: "Lié ? Qu'est-ce que ça veut dire ?",
    isPlayer: true
  },
  {
    speaker: "Akh",
    text: "Le livre cherche une fin. Et toi seul peux l'écrire. Tes liens avec certaines personnes — ceux que le livre reconnaît — seront visibles à tes yeux.",
    showChoices: [
      { label: "Quelles personnes ?", next: 9 },
      { label: "Voir mes yeux comme ça ?", next: 9 }
    ]
  },
  {
    speaker: "Akh",
    text: "Des gens qui portent quelque chose d'extraordinaire. Un pouvoir, une âme singulière. Tu verras un nombre au-dessus d'eux — une affinité. De −100 à +100.",
    showRuleCard: true,
    ruleLabel: "L'Affinité",
    ruleItems: [
      { icon: "◈", text: "<strong>L'affinité</strong> mesure le lien entre toi et une personne. Elle va de −100 à +100." },
      { icon: "◈", text: "Seules certaines personnes ont une affinité — celles que le livre reconnaît." },
      { icon: "◈", text: "Elle évolue selon tes choix, tes actes, tes paroles envers eux." }
    ]
  },
  {
    speaker: "Atsushi",
    text: "Et si l'affinité monte à 100 ?",
    isPlayer: true
  },
  {
    speaker: "Akh",
    text: "Un Khepry Blanc apparaîtra. Le scarabée d'or — symbole de renaissance. C'est le lien accompli.",
    showRuleCard: true,
    ruleLabel: "Le Khepry Blanc",
    ruleItems: [
      { icon: "𓆣", text: "<strong>Khepry Blanc</strong> — obtenu quand l'affinité atteint +100 avec quelqu'un." },
      { icon: "𓆣", text: "Avec <strong>un seul Khepry Blanc</strong>, tu peux sceller le pouvoir du livre." },
      { icon: "𓆣", text: "Avec <strong>sept Khepry Blancs</strong>, le livre t'offre ce qu'il a promis à Mérenrê : l'immortalité." }
    ]
  },
  {
    speaker: "Atsushi",
    text: "Et si ça descend à −100 ?",
    isPlayer: true
  },
  {
    speaker: "Akh",
    text: "Un Khepry Rouge. Le scarabée noir. Un lien brisé — une haine inscrite dans les pages du livre.",
    showRuleCard: true,
    ruleLabel: "Le Khepry Rouge",
    ruleItems: [
      { icon: "𓆣", text: "<strong>Khepry Rouge</strong> — obtenu quand l'affinité descend à −100 avec quelqu'un.", danger: true },
      { icon: "𓆣", text: "Ne serait-ce qu'<strong>un seul Khepry Rouge</strong> suffit.", danger: true },
      { icon: "𓆣", text: "Le Détenteur meurt. Son âme est détruite. Le livre cherche un nouveau porteur.", danger: true }
    ]
  },
  {
    speaker: "Atsushi",
    text: "C'est... ce qui est arrivé à Mérenrê ?",
    isPlayer: true
  },
  {
    speaker: "Akh",
    text: "Oui. Il a obtenu un Khepry Rouge avant d'avoir complété les sept. Ses prêtres l'ont scellé — mais leur méthode était imparfaite. C'est pour cela que Kaito a pu le retrouver.",
  },
  {
    speaker: "Akh",
    text: "Le livre t'appartient maintenant. Sois prudent avec les liens que tu construis — et ceux que tu détruis.",
  },
  {
    speaker: "Atsushi",
    text: "Est-ce que je peux choisir de ne pas jouer ?",
    isPlayer: true
  },
  {
    speaker: "Akh",
    text: "Le livre est déjà ouvert.",
    pause: true
  },
  {
    speaker: null,
    text: "La lumière s'estompe. Le vide se referme comme une page qu'on tourne.",
    isNarration: true,
    last: true
  }
];

let currentScene = 0;
let isTyping = false;
let typeInterval = null;
let ruleOpen = false;

const dialogText = document.getElementById('dialog-text');
const cursorEl = document.getElementById('cursor-blink');
const nextArrow = document.getElementById('next-arrow');
const speakerName = document.getElementById('speaker-name');
const speakerBadge = document.getElementById('speaker-badge');
const choicesArea = document.getElementById('choices-area');
const ruleCard = document.getElementById('rule-card');
const pageIndicator = document.getElementById('page-indicator');

function buildPageDots() {
  pageIndicator.innerHTML = '';
  for (let i = 0; i < scenes.length; i++) {
    const d = document.createElement('div');
    d.className = 'nav-dot' + (i === currentScene ? ' active' : '');
    d.onclick = () => { currentScene = i; showScene(); };
    pageIndicator.appendChild(d);
  }
}

function updateDots() {
  const dots = pageIndicator.querySelectorAll('.nav-dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === currentScene));
}

function typeText(text, onDone) {
  dialogText.textContent = '';
  cursorEl.style.opacity = '1';
  nextArrow.style.opacity = '0';
  isTyping = true;
  let i = 0;
  clearInterval(typeInterval);
  typeInterval = setInterval(() => {
    if (i < text.length) {
      dialogText.textContent += text[i++];
    } else {
      clearInterval(typeInterval);
      isTyping = false;
      cursorEl.style.opacity = '0';
      nextArrow.style.opacity = '1';
      if (onDone) onDone();
    }
  }, 22);
}

function showScene() {
  if (currentScene >= scenes.length) return;
  const s = scenes[currentScene];

  choicesArea.style.display = 'none';
  choicesArea.innerHTML = '';
  closeRuleCard();

  if (s.speaker === null) {
    speakerBadge.style.opacity = '0';
  } else {
    speakerBadge.style.opacity = '1';
    speakerName.textContent = s.speaker;
    speakerBadge.style.borderColor = s.isPlayer ? 'rgba(180,220,255,0.35)' : 'rgba(200,160,80,0.35)';
    speakerBadge.style.background = s.isPlayer ? 'rgba(180,220,255,0.08)' : 'rgba(200,160,80,0.10)';
    speakerBadge.style.color = s.isPlayer ? '#90b8e0' : '#c8a050';
    speakerBadge.querySelector('.dot').style.background = s.isPlayer ? '#90b8e0' : '#c8a050';
  }

  dialogText.style.color = s.isNarration ? 'rgba(200,180,130,0.65)' : '#e8d8b0';
  dialogText.style.fontStyle = s.isNarration ? 'italic' : 'italic';

  if (s.writeLines) animateBookLines();

  typeText(s.text, () => {
    if (s.showChoices) renderChoices(s.showChoices);
    if (s.showRuleCard) setTimeout(() => showRuleCard(s.ruleLabel, s.ruleItems), 300);
    if (s.last) {
      nextArrow.textContent = '✦';
    }
  });

  updateDots();
}

function renderChoices(choices) {
  choicesArea.innerHTML = '';
  choicesArea.style.display = 'flex';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = () => {
      choicesArea.style.display = 'none';
      currentScene = c.next;
      showScene();
    };
    choicesArea.appendChild(btn);
  });
}

function showRuleCard(label, items) {
  ruleCard.innerHTML = '';
  ruleCard.style.display = 'flex';
  ruleOpen = true;

  const title = document.createElement('div');
  title.style.cssText = 'font-family: Cinzel, serif; font-size: 12px; letter-spacing: 2px; color: #c8a050; margin-bottom: 6px; text-transform: uppercase;';
  title.textContent = '✦ ' + label;
  ruleCard.appendChild(title);

  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'rule-item';
    if (item.danger) row.style.borderColor = 'rgba(200,80,80,0.25)';
    row.innerHTML = `<div class="rule-icon" style="color:${item.danger ? '#c06060' : '#c8a050'}">${item.icon}</div><div class="rule-text">${item.text}</div>`;
    ruleCard.appendChild(row);
  });

  const closeBtn = document.createElement('button');
  closeBtn.className = 'rule-close-btn';
  closeBtn.textContent = 'Continuer';
  closeBtn.onclick = () => { closeRuleCard(); };
  ruleCard.appendChild(closeBtn);
}

function closeRuleCard() {
  ruleCard.style.display = 'none';
  ruleCard.innerHTML = '';
  ruleOpen = false;
}

function advance() {
  if (ruleOpen) return;
  if (isTyping) {
    clearInterval(typeInterval);
    const s = scenes[currentScene];
    dialogText.textContent = s.text;
    isTyping = false;
    cursorEl.style.opacity = '0';
    nextArrow.style.opacity = '1';
    if (s.showChoices) renderChoices(s.showChoices);
    return;
  }
  const s = scenes[currentScene];
  if (s.showChoices && choicesArea.style.display !== 'none') return;
  if (currentScene < scenes.length - 1) {
    currentScene++;
    showScene();
  }
}

function animateBookLines() {
  const lines = document.querySelectorAll('.text-anim, [id^="bl"]');
  let delay = 0;
  document.querySelectorAll('#book-svg rect:not([fill*="url"])').forEach((r, i) => {
    if (i > 2) {
      setTimeout(() => {
        r.style.transition = 'fill 0.4s';
        r.setAttribute('fill', 'rgba(200,160,80,' + (0.15 + Math.random() * 0.2) + ')');
      }, i * 120);
    }
  });
}

const canvas = document.getElementById('voidCanvas');
const ctx = canvas.getContext('2d');
let stars = [];
let particles = [];

function initVoid() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width || 680;
  canvas.height = 220;
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      sp: Math.random() * 0.008 + 0.002,
      ph: Math.random() * Math.PI * 2
    });
  }
}

function spawnParticle() {
  const cx = canvas.width / 2;
  const angle = Math.random() * Math.PI * 2;
  const dist = 30 + Math.random() * 40;
  const el = document.createElement('div');
  el.className = 'particle';
  const size = Math.random() * 3 + 1.5;
  el.style.cssText = `
    width: ${size}px; height: ${size}px;
    left: ${cx + Math.cos(angle) * dist}px;
    top: ${90 + Math.sin(angle) * 20}px;
    background: rgba(200,160,80,${0.4 + Math.random() * 0.5});
    animation-duration: ${2 + Math.random() * 2}s;
    animation-delay: ${Math.random() * 1}s;
  `;
  document.getElementById('particles-layer').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

let animFrame;
function drawVoid(t) {
  if (!ctx) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0c0a10';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2, cy = 110;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180);
  grad.addColorStop(0, 'rgba(200,160,80,0.07)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  stars.forEach(s => {
    s.a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.sp + s.ph));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(230,210,160,${s.a})`;
    ctx.fill();
  });

  for (let i = 1; i <= 3; i++) {
    const r = 30 + i * 18 + Math.sin(t * 0.001 + i) * 4;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r * 2.2, r * 0.7, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(200,160,80,${0.06 - i * 0.015})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  animFrame = requestAnimationFrame(drawVoid);
}

setInterval(spawnParticle, 400);


initVoid();
buildPageDots();
showScene();
requestAnimationFrame(drawVoid);
</script>
